# AIAds Platform - Prometheus Configuration
# Version: 1.0.0
# Last Updated: 2026-03-24
# Environment: Production (Canary + Stable)

global:
  # Scrape interval
  scrape_interval: 15s
  # Evaluation interval for rules
  evaluation_interval: 15s
  # External labels for federation
  external_labels:
    monitor: 'aiads-monitor'
    cluster: 'production'
    region: 'us-east-1'

# Alertmanager configuration
alerting:
  alertmanagers:
  - static_configs:
    - targets:
      - alertmanager.monitoring.svc.cluster.local:9093
    scheme: http
    timeout: 10s
    api_version: v2

# Rule files
rule_files:
  - /etc/prometheus/rules/alerting.yml
  - /etc/prometheus/rules/recording-rules.yml
  - /etc/prometheus/rules/canary-rules.yml

# Scrape configurations
scrape_configs:
  # ============================================
  # Prometheus Self-Monitoring
  # ============================================
  - job_name: 'prometheus'
    static_configs:
    - targets: ['localhost:9090']
      labels:
        environment: 'monitoring'
        service: 'prometheus'

  # ============================================
  # Node Exporter - Infrastructure Metrics
  # ============================================
  - job_name: 'node-exporter'
    kubernetes_sd_configs:
    - role: node
    relabel_configs:
    - source_labels: [__meta_kubernetes_node_label_node_exporter]
      action: keep
      regex: true
    - action: labelmap
      regex: __meta_kubernetes_node_label_(.+)
    static_configs:
    - targets: ['node-exporter.monitoring.svc.cluster.local:9100']

  # ============================================
  # Kubernetes API Server
  # ============================================
  - job_name: 'kubernetes-apiservers'
    kubernetes_sd_configs:
    - role: endpoints
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
    - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
      action: keep
      regex: default;kubernetes;https

  # ============================================
  # Kubernetes kubelet
  # ============================================
  - job_name: 'kubernetes-kubelet'
    kubernetes_sd_configs:
    - role: node
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
    - action: labelmap
      regex: __meta_kubernetes_node_label_(.+)

  # ============================================
  # Kubernetes cAdvisor
  # ============================================
  - job_name: 'kubernetes-cadvisor'
    kubernetes_sd_configs:
    - role: node
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    metrics_path: /metrics/cadvisor
    relabel_configs:
    - action: labelmap
      regex: __meta_kubernetes_node_label_(.+)

  # ============================================
  # Kubernetes Service Discovery
  # ============================================
  - job_name: 'kubernetes-service-endpoints'
    kubernetes_sd_configs:
    - role: endpoints
    relabel_configs:
    - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
      action: keep
      regex: true
    - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scheme]
      action: replace
      target_label: __scheme__
      regex: (https?)
    - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
      action: replace
      target_label: __metrics_path__
      regex: (.+)
    - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
      action: replace
      target_label: __address__
      regex: ([^:]+)(?::\d+)?;(\d+)
      replacement: $1:$2
    - action: labelmap
      regex: __meta_kubernetes_service_annotation_(.+)
    - source_labels: [__meta_kubernetes_namespace]
      action: replace
      target_label: kubernetes_namespace
    - source_labels: [__meta_kubernetes_service_name]
      action: replace
      target_label: kubernetes_name

  # ============================================
  # AIAds Canary Environment
  # ============================================
  - job_name: 'aiads-canary'
    kubernetes_sd_configs:
    - role: pod
      namespaces:
        names:
        - aiads
    relabel_configs:
    # Only scrape canary pods
    - source_labels: [__meta_kubernetes_pod_label_environment]
      action: keep
      regex: canary
    - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
      action: keep
      regex: true
    - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
      action: replace
      target_label: __metrics_path__
      regex: (.+)
    - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
      action: replace
      target_label: __address__
      regex: ([^:]+)(?::\d+)?;(\d+)
      replacement: $1:$2
    - action: labelmap
      regex: __meta_kubernetes_pod_label_(.+)
    - source_labels: [__meta_kubernetes_namespace]
      action: replace
      target_label: namespace
    - source_labels: [__meta_kubernetes_pod_name]
      action: replace
      target_label: pod

  # ============================================
  # AIAds Stable Environment
  # ============================================
  - job_name: 'aiads-stable'
    kubernetes_sd_configs:
    - role: pod
      namespaces:
        names:
        - aiads
    relabel_configs:
    # Only scrape stable pods
    - source_labels: [__meta_kubernetes_pod_label_environment]
      action: keep
      regex: stable
    - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
      action: keep
      regex: true
    - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
      action: replace
      target_label: __metrics_path__
      regex: (.+)
    - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
      action: replace
      target_label: __address__
      regex: ([^:]+)(?::\d+)?;(\d+)
      replacement: $1:$2
    - action: labelmap
      regex: __meta_kubernetes_pod_label_(.+)
    - source_labels: [__meta_kubernetes_namespace]
      action: replace
      target_label: namespace
    - source_labels: [__meta_kubernetes_pod_name]
      action: replace
      target_label: pod

  # ============================================
  # Nginx Ingress Controller
  # ============================================
  - job_name: 'nginx-ingress'
    kubernetes_sd_configs:
    - role: pod
      namespaces:
        names:
        - ingress-nginx
    relabel_configs:
    - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
      action: keep
      regex: true
    - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
      action: replace
      target_label: __metrics_path__
      regex: (.+)
    - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
      action: replace
      target_label: __address__
      regex: ([^:]+)(?::\d+)?;(\d+)
      replacement: $1:$2

  # ============================================
  # PostgreSQL Database
  # ============================================
  - job_name: 'postgres'
    static_configs:
    - targets: ['postgres-exporter.aiads.svc.cluster.local:9187']
      labels:
        environment: 'production'
        service: 'postgres'

  # ============================================
  # Redis Cache
  # ============================================
  - job_name: 'redis'
    static_configs:
    - targets: ['redis-exporter.aiads.svc.cluster.local:9121']
      labels:
        environment: 'production'
        service: 'redis'

  # ============================================
  # Blackbox Exporter - Endpoint Health Checks
  # ============================================
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
    - targets:
      - https://aiads.com/health
      - https://aiads.com/health/live
      - https://aiads.com/health/ready
      - https://canary.aiads.com/health
      labels:
        probe_type: 'http'
    relabel_configs:
    - source_labels: [__address__]
      target_label: __param_target
    - source_labels: [__param_target]
      target_label: instance
    - target_label: __address__
      replacement: blackbox-exporter.monitoring.svc.cluster.local:9115

  # ============================================
  # Pushgateway - For Batch Jobs
  # ============================================
  - job_name: 'pushgateway'
    static_configs:
    - targets: ['pushgateway.monitoring.svc.cluster.local:9091']
    honor_labels: true

