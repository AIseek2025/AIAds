# AIAds Platform - Canary Service
# Version: 1.0.0
# Environment: Canary
# Last Updated: 2026-03-24

apiVersion: v1
kind: Service
metadata:
  name: aiads-canary
  namespace: aiads
  labels:
    app: aiads
    environment: canary
    track: canary
  annotations:
    description: "AIAds Canary Service - Routes 10% traffic"
    prometheus.io/scrape: "true"
    prometheus.io/port: "3000"
spec:
  type: ClusterIP
  selector:
    app: aiads
    environment: canary
    track: canary
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 3000
    protocol: TCP
  
  # Session affinity for consistent user experience
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800  # 3 hours

---
# Canary Service - Headless for direct pod access
apiVersion: v1
kind: Service
metadata:
  name: aiads-canary-headless
  namespace: aiads
  labels:
    app: aiads
    environment: canary
  annotations:
    description: "Headless service for canary direct access"
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: aiads
    environment: canary
    track: canary
  ports:
  - name: http
    port: 3000
    targetPort: 3000
    protocol: TCP

---
# Canary Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aiads-canary-ingress
  namespace: aiads
  labels:
    app: aiads
    environment: canary
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-weight: "10"
    nginx.ingress.kubernetes.io/canary-by-header: "X-Canary-User"
    nginx.ingress.kubernetes.io/canary-by-header-value: "true"
    nginx.ingress.kubernetes.io/canary-by-cookie: "canary"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  rules:
  - host: canary.aiads.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: aiads-canary
            port:
              number: 80
  tls:
  - hosts:
    - canary.aiads.com
    secretName: aiads-canary-tls

---
# Canary PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: aiads-canary-pdb
  namespace: aiads
  labels:
    app: aiads
    environment: canary
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: aiads
      environment: canary
      track: canary

---
# Canary NetworkPolicy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aiads-canary-netpol
  namespace: aiads
  labels:
    app: aiads
    environment: canary
spec:
  podSelector:
    matchLabels:
      app: aiads
      environment: canary
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow from ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - podSelector:
        matchLabels:
          app: nginx-ingress
    ports:
    - protocol: TCP
      port: 3000
  # Allow from monitoring
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 3000
  egress:
  # Allow to database
  - to:
    - namespaceSelector:
        matchLabels:
          name: aiads
      podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  # Allow to Redis
  - to:
    - namespaceSelector:
        matchLabels:
          name: aiads
      podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  # Allow DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
