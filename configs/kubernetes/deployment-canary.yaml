# AIAds Platform - Canary Deployment
# Version: 1.1.0
# Environment: Canary (25% Traffic)
# Last Updated: 2026-03-25

apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiads-canary
  namespace: aiads
  labels:
    app: aiads
    environment: canary
    version: v1.1.0
    track: canary
  annotations:
    description: "AIAds Canary Deployment - 25% Traffic"
    contact: "devops@aiads.com"
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: aiads
      environment: canary
      track: canary
  template:
    metadata:
      labels:
        app: aiads
        environment: canary
        version: v1.1.0
        track: canary
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      # Priority for canary pods
      priorityClassName: high-priority
      
      # Affinity rules for high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: aiads
                  environment: canary
              topologyKey: kubernetes.io/hostname
      
      # Node selector for canary workloads
      nodeSelector:
        workload-type: application
        environment: canary
      
      # Tolerations for canary nodes
      tolerations:
      - key: "canary"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      
      # Service account
      serviceAccountName: aiads-canary-sa
      
      # Security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      # Containers
      containers:
      - name: aiads
        image: aiads/platform:v1.1.0-canary
        imagePullPolicy: Always
        
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        
        # Environment variables
        env:
        - name: NODE_ENV
          value: "production"
        - name: ENVIRONMENT
          value: "canary"
        - name: VERSION
          value: "v1.1.0"
        - name: CANARY_RELEASE
          value: "true"
        - name: LOG_LEVEL
          value: "debug"
        - name: ENABLE_NEW_DASHBOARD
          value: "true"
        - name: ENABLE_AI_MATCHING
          value: "true"
        - name: ENABLE_PAYMENT_V2
          value: "false"
        # Database connection
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: aiads-db-secret
              key: url
        # Redis cache
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: aiads-redis-secret
              key: url
        # API keys
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: aiads-api-secret
              key: key
        
        # Resource limits and requests
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        
        # Health checks
        livenessProbe:
          httpGet:
            path: /health/live
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        startupProbe:
          httpGet:
            path: /health/startup
            port: 3000
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30
        
        # Volume mounts
        volumeMounts:
        - name: config
          mountPath: /app/config
          readOnly: true
        - name: logs
          mountPath: /app/logs
      
      # Init containers
      initContainers:
      - name: wait-for-db
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z $DATABASE_HOST 5432; do echo waiting for database; sleep 2; done']
        env:
        - name: DATABASE_HOST
          value: "postgres.aiads.svc.cluster.local"
      
      # Volumes
      volumes:
      - name: config
        configMap:
          name: aiads-canary-config
      - name: logs
        emptyDir: {}
      
      # DNS configuration
      dnsPolicy: ClusterFirst
      dnsConfig:
        searches:
          - aiads.svc.cluster.local
          - svc.cluster.local
          - cluster.local
      
      # Termination grace period
      terminationGracePeriodSeconds: 30
      
      # Restart policy
      restartPolicy: Always

---
# Canary Deployment - Metrics Collection Sidecar
apiVersion: v1
kind: ConfigMap
metadata:
  name: aiads-canary-config
  namespace: aiads
  labels:
    app: aiads
    environment: canary
data:
  app.config.json: |
    {
      "environment": "canary",
      "version": "v1.1.0",
      "featureFlags": {
        "canaryRelease": true,
        "newDashboard": true,
        "aiMatching": true,
        "paymentV2": false
      },
      "analytics": {
        "enabled": true,
        "samplingRate": 1.0
      },
      "logging": {
        "level": "debug",
        "format": "json"
      }
    }

---
# Service Account for Canary Deployment
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aiads-canary-sa
  namespace: aiads
  labels:
    app: aiads
    environment: canary
automountServiceAccountToken: false

---
# Priority Class for Canary Pods
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: high-priority
value: 1000000
globalDefault: false
description: "High priority for canary workloads"
