# AIAds Platform - Stable Deployment
# Version: 1.0.0
# Environment: Stable (90% Traffic)
# Last Updated: 2026-03-24

apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiads-stable
  namespace: aiads
  labels:
    app: aiads
    environment: stable
    version: v1.0.0
    track: stable
  annotations:
    description: "AIAds Stable Deployment - 90% Traffic"
    contact: "devops@aiads.com"
spec:
  replicas: 6
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 1
  selector:
    matchLabels:
      app: aiads
      environment: stable
      track: stable
  template:
    metadata:
      labels:
        app: aiads
        environment: stable
        version: v1.0.0
        track: stable
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      # Priority for stable pods
      priorityClassName: stable-priority
      
      # Affinity rules for high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: aiads
                  environment: stable
              topologyKey: kubernetes.io/hostname
        
        # Spread across availability zones
        podTopologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: aiads
              environment: stable
      
      # Node selector for stable workloads
      nodeSelector:
        workload-type: application
        environment: stable
      
      # Tolerations for stable nodes
      tolerations:
      - key: "stable"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      
      # Service account
      serviceAccountName: aiads-stable-sa
      
      # Security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      # Containers
      containers:
      - name: aiads
        image: aiads/platform:v1.0.0-stable
        imagePullPolicy: Always
        
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        
        # Environment variables
        env:
        - name: NODE_ENV
          value: "production"
        - name: ENVIRONMENT
          value: "stable"
        - name: VERSION
          value: "v1.0.0"
        - name: CANARY_RELEASE
          value: "false"
        - name: LOG_LEVEL
          value: "info"
        - name: ENABLE_NEW_DASHBOARD
          value: "false"
        - name: ENABLE_AI_MATCHING
          value: "true"
        - name: ENABLE_PAYMENT_V2
          value: "false"
        # Database connection
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: aiads-db-secret
              key: url
        # Redis cache
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: aiads-redis-secret
              key: url
        # API keys
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: aiads-api-secret
              key: key
        
        # Resource limits and requests
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        
        # Health checks
        livenessProbe:
          httpGet:
            path: /health/live
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        startupProbe:
          httpGet:
            path: /health/startup
            port: 3000
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30
        
        # Volume mounts
        volumeMounts:
        - name: config
          mountPath: /app/config
          readOnly: true
        - name: logs
          mountPath: /app/logs
      
      # Init containers
      initContainers:
      - name: wait-for-db
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z $DATABASE_HOST 5432; do echo waiting for database; sleep 2; done']
        env:
        - name: DATABASE_HOST
          value: "postgres.aiads.svc.cluster.local"
      
      # Volumes
      volumes:
      - name: config
        configMap:
          name: aiads-stable-config
      - name: logs
        emptyDir: {}
      
      # DNS configuration
      dnsPolicy: ClusterFirst
      dnsConfig:
        searches:
          - aiads.svc.cluster.local
          - svc.cluster.local
          - cluster.local
      
      # Termination grace period
      terminationGracePeriodSeconds: 30
      
      # Restart policy
      restartPolicy: Always

---
# Stable Deployment - ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: aiads-stable-config
  namespace: aiads
  labels:
    app: aiads
    environment: stable
data:
  app.config.json: |
    {
      "environment": "stable",
      "version": "v1.0.0",
      "featureFlags": {
        "canaryRelease": false,
        "newDashboard": false,
        "aiMatching": true,
        "paymentV2": false
      },
      "analytics": {
        "enabled": true,
        "samplingRate": 0.5
      },
      "logging": {
        "level": "info",
        "format": "json"
      }
    }

---
# Service Account for Stable Deployment
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aiads-stable-sa
  namespace: aiads
  labels:
    app: aiads
    environment: stable
automountServiceAccountToken: false

---
# Priority Class for Stable Pods
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: stable-priority
value: 500000
globalDefault: false
description: "Standard priority for stable workloads"
