# AIAds Platform - SSL/TLS Configuration
# Version: 1.0.0
# Last Updated: 2026-03-24
# Security Level: High (A+ Rating)

# ============================================
# SSL Certificate Paths
# ============================================
# Production certificates
ssl_certificate /etc/nginx/ssl/aiads.crt;
ssl_certificate_key /etc/nginx/ssl/aiads.key;

# Certificate chain (if using intermediate CA)
ssl_trusted_certificate /etc/nginx/ssl/aiads-chain.crt;

# DH parameters for DHE ciphers (generate with: openssl dhparam -out dhparam.pem 4096)
ssl_dhparam /etc/nginx/ssl/dhparam.pem;

# ============================================
# SSL Session Settings
# ============================================
ssl_session_timeout 1d;
ssl_session_cache shared:SSL:100m;
ssl_session_tickets off;

# ============================================
# Modern TLS Configuration
# ============================================
# Only allow TLS 1.2 and 1.3
ssl_protocols TLSv1.2 TLSv1.3;

# Strong cipher suites (Mozilla Modern Configuration)
ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

# Prefer server ciphers
ssl_prefer_server_ciphers off;

# ============================================
# OCSP Stapling
# ============================================
ssl_stapling on;
ssl_stapling_verify on;
resolver 8.8.8.8 8.8.4.4 1.1.1.1 1.0.0.1 valid=300s;
resolver_timeout 5s;

# ============================================
# HSTS (HTTP Strict Transport Security)
# ============================================
# Max age: 2 years (63072000 seconds)
# Include subdomains
# Allow preload for browser HSTS preload list
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# ============================================
# Security Headers
# ============================================
# Prevent clickjacking
add_header X-Frame-Options "SAMEORIGIN" always;

# Prevent MIME type sniffing
add_header X-Content-Type-Options "nosniff" always;

# XSS Protection
add_header X-XSS-Protection "1; mode=block" always;

# Referrer Policy
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Content Security Policy (adjust as needed)
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.aiads.com wss://ws.aiads.com; frame-ancestors 'self';" always;

# Permissions Policy (formerly Feature Policy)
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;

# ============================================
# SSL Buffer Size Optimization
# ============================================
ssl_buffer_size 4k;

# ============================================
# Early Data (TLS 1.3 0-RTT) - Use with caution
# ============================================
# ssl_early_data off;  # Disabled by default due to replay attack risk

# ============================================
# Certificate Transparency
# ============================================
# Expect-CT header for Certificate Transparency
add_header Expect-CT 'max-age=86400, enforce, report-uri="https://aiads.report-uri.com/r/t/ct/enforce"' always;

# ============================================
# SSL Logging
# ============================================
# Log SSL handshake failures
ssl_log_level warn;

# ============================================
# Rate Limiting for SSL Connections
# ============================================
# Prevent SSL/TLS DoS attacks
limit_conn_zone $ssl_session_id zone=ssl_limit:10m;

# ============================================
# ACME Challenge Location (for Let's Encrypt)
# ============================================
# Uncomment when renewing certificates
# location /.well-known/acme-challenge/ {
#     root /var/www/certbot;
#     allow all;
# }

# ============================================
# SSL Test Configuration
# ============================================
# Test configuration for SSL Labs A+ rating:
# - TLS 1.2 + 1.3 only
# - Strong ciphers only
# - HSTS with preload
# - OCSP Stapling
# - Forward secrecy

