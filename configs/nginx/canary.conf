# AIAds Platform - Production Release Configuration
# Version: 1.3.0
# Last Updated: 2026-05-06
# Traffic Split: 100% Production (Canary), Stable as Backup

# ============================================
# Production Upstream (100% Traffic - Formerly Canary)
# ============================================
upstream aiads_canary {
    least_conn;

    # Primary production server (formerly canary)
    server canary-1:3000 weight=100 max_fails=3 fail_timeout=30s;

    # Secondary production server (for HA)
    server canary-2:3000 weight=100 max_fails=3 fail_timeout=30s;

    # Keepalive connections
    keepalive 64;
    keepalive_timeout 60s;
    keepalive_requests 1000;
}

# ============================================
# Stable Upstream (Backup/Rollback)
# ============================================
upstream aiads_stable {
    least_conn;

    # Stable servers as backup (weight=0 for backup only)
    server stable-1:3000 weight=0 backup max_fails=3 fail_timeout=30s;
    server stable-2:3000 weight=0 backup max_fails=3 fail_timeout=30s;
    server stable-3:3000 weight=0 backup max_fails=3 fail_timeout=30s;

    # Keepalive connections
    keepalive 32;
    keepalive_timeout 60s;
    keepalive_requests 1000;
}

# ============================================
# WebSocket Support for Real-time Features (Production)
# ============================================
upstream aiads_canary_ws {
    ip_hash;
    server canary-1:3000 weight=1;
    server canary-2:3000 weight=1;
}

upstream aiads_stable_ws {
    ip_hash;
    server stable-1:3000 weight=0 backup;
    server stable-2:3000 weight=0 backup;
    server stable-3:3000 weight=0 backup;
}

# ============================================
# Map for Canary User Identification
# ============================================
map $http_x_canary_user $is_canary_user {
    default 0;
    "true" 1;
    "yes" 1;
    "1" 1;
}

map $http_cookie $is_canary_cookie {
    default 0;
    "~*canary=true" 1;
    "~*beta=true" 1;
}

map $http_x_user_group $is_beta_user {
    default 0;
    "beta" 1;
    "early_access" 1;
    "vip" 1;
}

# Combined canary flag
map "$is_canary_user$is_canary_cookie$is_beta_user" $canary_eligible {
    "000" 0;
    default 1;
}

# Random canary selection (10%)
map $request_id $canary_random {
    default 0;
    "~*" 1;
}

# ============================================
# Geo-based Canary (Optional - for specific regions)
# ============================================
geo $geo_canary {
    default 0;
    # Add specific regions for canary testing
    # 10.0.0.0/8 1;  # Internal network
}

# ============================================
# User Agent based Canary (for mobile testing)
# ============================================
map $http_user_agent $mobile_canary {
    default 0;
    ~*Mobile 1;
    ~*Android 1;
    ~*iPhone 1;
}

# ============================================
# A/B Test Group Assignment
# ============================================
map $http_x_ab_test $ab_group {
    default "control";
    "variant_a" "variant_a";
    "variant_b" "variant_b";
}

# ============================================
# Rate Limiting by Environment
# ============================================
limit_req_zone $binary_remote_addr zone=canary_limit:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=stable_limit:10m rate=100r/s;

# ============================================
# Health Check Configuration
# ============================================
# Note: Requires nginx_plus or nginx with health_check module
# For open source nginx, use external health check scripts

# Canary health check endpoint
# health_check uri=/health interval=5s fails=3 passes=2;

# ============================================
# Logging Configuration for Canary Analysis
# ============================================
log_format canary_json escape=json
    '{'
        '"timestamp":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request_method":"$request_method",'
        '"request_uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_status":"$upstream_status",'
        '"upstream_response_time":"$upstream_response_time",'
        '"environment":"$upstream_canary",'
        '"canary_user":"$is_canary_user",'
        '"canary_cookie":"$is_canary_cookie",'
        '"user_agent":"$http_user_agent",'
        '"referer":"$http_referer"'
    '}';

# Separate log files for canary analysis
access_log /var/log/nginx/canary_access.log canary_json;
error_log /var/log/nginx/canary_error.log warn;
